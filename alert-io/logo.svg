<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" width="100%">
  <!-- Background -->
  <rect width="680" height="300" fill="#0D1117"/>

  <!-- RADAR SYMBOL  centered at cx=130, cy=150 -->
  <!-- Outer ring -->
  <circle cx="130" cy="150" r="82" fill="none" stroke="#00FF88" stroke-width="1" opacity="0.18"/>
  <!-- Medium ring -->
  <circle cx="130" cy="150" r="58" fill="none" stroke="#00FF88" stroke-width="1" opacity="0.35"/>
  <!-- Inner ring -->
  <circle cx="130" cy="150" r="34" fill="none" stroke="#00FF88" stroke-width="1.5" opacity="0.6"/>
  <!-- Center dot -->
  <circle cx="130" cy="150" r="10" fill="#00FF88"/>
  <!-- Sweep line (45� up-right) -->
  <line x1="130" y1="150" x2="188" y2="92" stroke="#00FF88" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Crosshair ticks  4 cardinal points -->
  <!-- Top -->
  <line x1="130" y1="62" x2="130" y2="50" stroke="#00FF88" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <!-- Bottom -->
  <line x1="130" y1="238" x2="130" y2="250" stroke="#00FF88" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <!-- Left -->
  <line x1="42" y1="150" x2="30" y2="150" stroke="#00FF88" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <!-- Right -->
  <line x1="218" y1="150" x2="230" y2="150" stroke="#00FF88" stroke-width="1" opacity="0.4" stroke-linecap="round"/>

  <!-- WORDMARK -->
  <!-- "ALERT" -->
  <text x="280" y="152" font-family="'Courier New', monospace" font-size="64" font-weight="700" fill="#E6EDF3" letter-spacing="-2">ALERT</text>
  <!-- ".IO" -->
  <text x="280" y="182" font-family="'Courier New', monospace" font-size="22" font-weight="400" fill="#00FF88" letter-spacing="12">.IO</text>

  <!-- Separator line -->
  <line x1="280" y1="196" x2="600" y2="196" stroke="#00FF88" stroke-width="0.5" opacity="0.35"/>

  <!-- Tagline -->
  <text x="280" y="218" font-family="'Courier New', monospace" font-size="11" fill="#8B949E" letter-spacing="3.5">FROM ALERT TO ACTION</text>

  <!-- Version badge -->
  <rect x="280" y="232" width="52" height="20" rx="4" fill="rgba(0,255,136,0.1)" stroke="rgba(0,255,136,0.3)" stroke-width="0.5"/>
  <text x="306" y="246" font-family="'Courier New', monospace" font-size="10" font-weight="700" fill="#00FF88" text-anchor="middle">v2.0</text>
</svg>
