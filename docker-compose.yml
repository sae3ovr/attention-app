services:
  postgres:
    image: postgres:16-alpine
    container_name: alertio-db
    restart: unless-stopped
    ports:
      - '127.0.0.1:5432:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alertio}
      POSTGRES_USER: ${POSTGRES_USER:-alertio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./alert-backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-alertio} -d ${POSTGRES_DB:-alertio}']
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    build: ./alert-backend
    container_name: alertio-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: '3000'
      DATABASE_URL: postgresql://${POSTGRES_USER:-alertio}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-alertio}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8081,http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
